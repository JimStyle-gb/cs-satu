# Path: .github/workflows/build_alstyle.yml
#
# Build_AlStyle — workflow сборки AlStyle.
#
# Что делает:
# - запускает supplier build pipeline и публикует артефакты;
# - держит только CI/CD orchestration без supplier parsing logic.
#
# Что не делает:
# - не хранит supplier business-логику;
# - не подменяет scripts/build_*.py.
name: Build_AlStyle

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 -> 02:00 local = 21:00 UTC предыдущего дня
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  build_alstyle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: build_alstyle
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw

      - name: Smoke test
        run: |
          python - <<'PY'
          from __future__ import annotations

          import importlib
          import py_compile
          import sys
          from pathlib import Path

          root = Path.cwd()
          scripts_dir = root / 'scripts'
          cs_dir = scripts_dir / 'cs'
          supplier_dir = scripts_dir / 'suppliers' / 'alstyle'
          build_file = scripts_dir / 'build_alstyle.py'

          required = [cs_dir, supplier_dir, build_file]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing smoke-test targets: ' + ', '.join(missing))

          py_files = []
          for directory in (cs_dir, supplier_dir):
              py_files.extend(sorted(directory.rglob('*.py')))
          py_files.append(build_file)

          unique_files = []
          seen = set()
          for path in py_files:
              key = str(path.resolve())
              if key in seen:
                  continue
              seen.add(key)
              unique_files.append(path)

          for path in unique_files:
              py_compile.compile(str(path), doraise=True)

          sys.path.insert(0, str(scripts_dir.resolve()))
          for path in unique_files:
              module_name = '.'.join(path.relative_to(scripts_dir).with_suffix('').parts)
              importlib.import_module(module_name)

          print('Scoped smoke test OK: cs + alstyle + build_alstyle.py')
          PY

      - name: Show build version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("scripts/build_alstyle.py").read_text(encoding="utf-8", errors="ignore")
          m = re.search(r'BUILD_[A-Z_]+_VERSION\s*=\s*["\']([^"\']+)["\']', text)
          print("build_version:", m.group(1) if m else "unknown")
          PY

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp
          if [ -f docs/alstyle.yml ]; then
            cp -f docs/alstyle.yml /tmp/prev_alstyle.yml
          else
            : > /tmp/prev_alstyle.yml
          fi

      - name: Build feed (alstyle)
        run: |
          python scripts/build_alstyle.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/alstyle.yml docs/raw/alstyle.yml 2>/dev/null || true
          [ -f docs/raw/alstyle_quality_gate.txt ] && sed -n '1,260p' docs/raw/alstyle_quality_gate.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alstyle-build-output
          path: |
            docs/alstyle.yml
            docs/raw/alstyle.yml
            docs/raw/category_id_unresolved.txt
            docs/raw/alstyle_quality_gate.txt
          if-no-files-found: warn

      - name: Commit & push docs/alstyle.yml
        if: success()
        run: |
          git add docs/alstyle.yml docs/raw/alstyle.yml
          if [ -f docs/raw/category_id_unresolved.txt ]; then
            git add docs/raw/category_id_unresolved.txt
          fi
          if [ -f docs/raw/alstyle_quality_gate.txt ]; then
            git add docs/raw/alstyle_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: alstyle feed"
          git pull --rebase --autostash
          git push
