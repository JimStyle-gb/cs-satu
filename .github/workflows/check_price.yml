name: Check_Price

on:
  workflow_dispatch:
  schedule:
    # Алматы 05:30 local
    - cron: "30 5 * * *"
      timezone: "Asia/Almaty"

env:
  TZ: Asia/Almaty

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/build_price_checker.py

      - name: Commit checker reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/raw/price_checker_report.txt docs/raw/price_checker_last_success.json || true
          git diff --cached --quiet || git commit -m "Update Price checker reports"
          git push

      - name: Fallback Telegram on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            TEXT=$'❌ Price — НЕУСПЕШНО\n\nПричина: Checker завершился с ошибкой на уровне workflow.\n\nСтатус проверки Price: НЕУСПЕШНО'
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${TEXT}" >/dev/null
          fi
