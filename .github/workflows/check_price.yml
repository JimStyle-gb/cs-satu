# Path: .github/workflows/check_price.yml
#
# Check_Price — workflow проверки итогового Price YML.
#
# Что делает:
# - запускает price checker и публикует отчёты;
# - держит только CI/CD orchestration без бизнес-логики checker.
#
# Что не делает:
# - не хранит правила оценки quality gate;
# - не подменяет scripts/build_price_checker.py.
name: Check_Price

on:
  workflow_dispatch:
  schedule:
    # Алматы 05:30 local
    - cron: "30 5 * * *"
      timezone: "Asia/Almaty"

permissions:
  contents: write

jobs:
  check_price:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: check_price
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw

      - name: Smoke test
        run: |
          python - <<'PY'
          from __future__ import annotations

          import importlib.util
          import py_compile
          from pathlib import Path

          root = Path.cwd()
          checker_file = root / 'scripts' / 'build_price_checker.py'
          price_file = root / 'docs' / 'Price.yml'

          required = [checker_file, price_file]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing smoke-test targets: ' + ', '.join(missing))

          py_compile.compile(str(checker_file), doraise=True)

          spec = importlib.util.spec_from_file_location('build_price_checker_smoke', checker_file)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          print('Scoped smoke test OK: build_price_checker.py + docs/Price.yml')
          PY

      - name: Run price checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/build_price_checker.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/raw/price_checker_report.txt docs/raw/price_checker_details.txt docs/raw/price_checker_last_success.json 2>/dev/null || true
          [ -f docs/raw/price_checker_report.txt ] && sed -n '1,220p' docs/raw/price_checker_report.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-checker-output
          path: |
            docs/raw/price_checker_report.txt
            docs/raw/price_checker_details.txt
            docs/raw/price_checker_last_success.json
          if-no-files-found: warn

      - name: Commit & push checker reports
        if: always()
        run: |
          if [ ! -f docs/raw/price_checker_report.txt ] || [ ! -f docs/raw/price_checker_details.txt ]; then
            echo "Checker reports were not produced. Skip commit."
            exit 0
          fi

          git add docs/raw/price_checker_report.txt docs/raw/price_checker_details.txt
          if [ -f docs/raw/price_checker_last_success.json ]; then
            git add docs/raw/price_checker_last_success.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "check: price checker reports"
          git pull --rebase --autostash
          git push

      - name: Fallback Telegram on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            TEXT=$'❌ Price — НЕУСПЕШНО\n\nПричина: Checker завершился с ошибкой на уровне workflow.\n\nСтатус проверки Price: НЕУСПЕШНО'
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${TEXT}" \
              --data-urlencode "parse_mode=HTML" >/dev/null
          fi
