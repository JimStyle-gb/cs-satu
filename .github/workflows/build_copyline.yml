# Path: .github/workflows/build_copyline.yml
#
# Build_CopyLine — workflow сборки CopyLine.
#
# Что делает:
# - запускает supplier build pipeline и публикует артефакты;
# - держит только CI/CD orchestration без supplier parsing logic.
#
# Что не делает:
# - не хранит supplier business-логику;
# - не подменяет scripts/build_*.py.
name: Build_CopyLine

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 -> 04:00 local = 23:00 UTC предыдущего дня
    - cron: "0 23 1,10,20 * *"

permissions:
  contents: write

jobs:
  build_copyline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: build_copyline
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw docs/debug
      - name: Full scripts smoke test
        run: |
          python - <<'PY'
          import compileall
          import importlib
          import sys
          from pathlib import Path

          repo = Path('.').resolve()
          scripts_dir = repo / 'scripts'
          sys.path.insert(0, str(repo))
          sys.path.insert(0, str(scripts_dir))

          ok = compileall.compile_dir(str(scripts_dir), force=True, quiet=1)
          if not ok:
              raise SystemExit('compileall failed')

          shared = [
              'cs.core',
              'cs.description',
              'cs.pricing',
              'cs.writer',
              'cs.util',
              'cs.meta',
              'cs.keywords',
              'cs.validators',
              'cs.policy',
              'cs.qg_report',
          ]
          for name in shared:
              importlib.import_module(name)

          for path in scripts_dir.glob('build_*.py'):
              importlib.import_module(path.stem)

          for path in scripts_dir.rglob('*.py'):
              if '__pycache__' in path.parts:
                  continue
              if path.name == '__init__.py':
                  continue
              try:
                  rel = path.relative_to(scripts_dir)
              except ValueError:
                  continue
              mod = '.'.join(rel.with_suffix('').parts)
              if mod == 'smoke_imports':
                  continue
              importlib.import_module(mod)

          print('smoke imports ok')
          PY

      - name: Show build version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("scripts/build_copyline.py").read_text(encoding="utf-8", errors="ignore")
          m = re.search(r"BUILD_[A-Z_]+_VERSION\s*=\s*[\'\"]([^\'\"]+)[\'\"]", text)
          print("build_version:", m.group(1) if m else "unknown")
          PY

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp
          if [ -f docs/copyline.yml ]; then
            cp -f docs/copyline.yml /tmp/prev_copyline.yml
          else
            : > /tmp/prev_copyline.yml
          fi

      - name: Build feed (copyline)
        run: |
          python scripts/build_copyline.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw docs/debug || true
          wc -c docs/copyline.yml docs/raw/copyline.yml 2>/dev/null || true
          [ -f docs/raw/copyline_quality_gate.txt ] && sed -n '1,260p' docs/raw/copyline_quality_gate.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copyline-build-output
          path: |
            docs/copyline.yml
            docs/raw/copyline.yml
            docs/raw/copyline_quality_gate.txt
          if-no-files-found: warn

      - name: Commit & push docs/copyline.yml
        if: success()
        run: |
          git add docs/copyline.yml docs/raw/copyline.yml
          if [ -f docs/raw/copyline_quality_gate.txt ]; then
            git add docs/raw/copyline_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: copyline feed"
          git pull --rebase --autostash
          git push
