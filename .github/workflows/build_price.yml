name: Build_Price

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *'
      timezone: 'Asia/Almaty'

jobs:
  build-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Sanity check build_price.py
        run: |
          python -m py_compile scripts/build_price.py

      - name: Build Price
        run: |
          python scripts/build_price.py

      - name: Commit Price artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/Price.yml docs/raw/price_satu_unmapped_offers.txt docs/raw/price_satu_portal_audit.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build Price"
            git push
          fi
