# Path: .github/workflows/build_price.yml
#
# Build_Price — workflow сборки итогового Price YML.
#
# Что делает:
# - запускает общий build Price;
# - публикует итоговые артефакты;
# - держит только CI/CD orchestration без бизнес-логики supplier parsing.
#
# Что не делает:
# - не хранит category/business-логику Price;
# - не подменяет scripts/build_price.py.
name: Build_Price

on:
  workflow_dispatch:
  schedule:
    # Алматы 04:30 local
    - cron: "30 4 * * *"
      timezone: "Asia/Almaty"

permissions:
  contents: write

jobs:
  build_price:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: build_price
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pyyaml
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw

      - name: Smoke test
        run: |
          python - <<'PY'
          from __future__ import annotations

          import importlib.util
          import py_compile
          from pathlib import Path

          root = Path.cwd()
          build_file = root / 'scripts' / 'build_price.py'
          config_dir = root / 'scripts' / 'cs' / 'config'
          required_configs = [
              config_dir / 'price_categories.yml',
              config_dir / 'price_portal_map.yml',
              config_dir / 'price_portal_overrides.yml',
              config_dir / 'satu_portal_categories.yml',
          ]

          required = [build_file, *required_configs]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing smoke-test targets: ' + ', '.join(missing))

          py_compile.compile(str(build_file), doraise=True)

          spec = importlib.util.spec_from_file_location('build_price_smoke', build_file)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          print('Scoped smoke test OK: build_price.py + price config files')
          PY

      - name: Build Price
        run: |
          python scripts/build_price.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/Price.yml docs/raw/price_satu_unmapped_offers.txt docs/raw/price_satu_portal_audit.txt 2>/dev/null || true
          [ -f docs/raw/price_satu_portal_audit.txt ] && sed -n '1,220p' docs/raw/price_satu_portal_audit.txt || true
          [ -f docs/raw/price_satu_unmapped_offers.txt ] && sed -n '1,220p' docs/raw/price_satu_unmapped_offers.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-build-output
          path: |
            docs/Price.yml
            docs/raw/price_satu_unmapped_offers.txt
            docs/raw/price_satu_portal_audit.txt
          if-no-files-found: warn

      - name: Commit & push Price artifacts
        if: success()
        run: |
          git add docs/Price.yml docs/raw/price_satu_unmapped_offers.txt docs/raw/price_satu_portal_audit.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: price feed"
          git pull --rebase --autostash
          git push
