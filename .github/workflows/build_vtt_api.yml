name: Build_VTT_API

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests zeep pyyaml

      - name: Py compile
        run: |
          python -m py_compile scripts/build_vtt_api.py
          python -m py_compile scripts/suppliers/vtt_api/source.py
          python -m py_compile scripts/suppliers/vtt_api/normalize.py
          python -m py_compile scripts/suppliers/vtt_api/filtering.py
          python -m py_compile scripts/suppliers/vtt_api/builder.py

      - name: Build VTT_api
        env:
          VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
          VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}
          VTT_API_WSDL: ${{ secrets.VTT_API_WSDL }}
        run: |
          python scripts/build_vtt_api.py

      - name: Commit docs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/vtt_api.yml docs/raw/vtt_api.yml docs/raw/vtt_api_quality_gate.txt || true
          git diff --cached --quiet && exit 0
          git commit -m "Build VTT_api"
          git push
