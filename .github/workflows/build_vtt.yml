# Path: .github/workflows/build_vtt.yml
#
# Build_VTT — workflow сборки VTT.
#
# Что делает:
# - запускает supplier build pipeline и публикует артефакты;
# - держит только CI/CD orchestration без supplier parsing logic.
#
# Что не делает:
# - не хранит supplier business-логику;
# - не подменяет scripts/build_*.py.
name: Build_VTT

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 -> 05:00 local = 00:00 UTC
    - cron: "0 0 1,10,20 * *"

permissions:
  contents: write

concurrency:
  group: build_vtt
  cancel-in-progress: true

jobs:
  build_index:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TZ: Asia/Almaty
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw docs/debug/vtt_shards
      - name: Full scripts smoke test
        run: |
          python - <<'PY'
          import compileall
          import importlib
          import sys
          from pathlib import Path

          repo = Path('.').resolve()
          scripts_dir = repo / 'scripts'
          sys.path.insert(0, str(repo))
          sys.path.insert(0, str(scripts_dir))

          ok = compileall.compile_dir(str(scripts_dir), force=True, quiet=1)
          if not ok:
              raise SystemExit('compileall failed')

          shared = [
              'cs.core',
              'cs.description',
              'cs.pricing',
              'cs.writer',
              'cs.util',
              'cs.meta',
              'cs.keywords',
              'cs.validators',
              'cs.policy',
              'cs.qg_report',
          ]
          for name in shared:
              importlib.import_module(name)

          for path in scripts_dir.glob('build_*.py'):
              importlib.import_module(path.stem)

          for path in scripts_dir.rglob('*.py'):
              if '__pycache__' in path.parts:
                  continue
              if path.name == '__init__.py':
                  continue
              try:
                  rel = path.relative_to(scripts_dir)
              except ValueError:
                  continue
              mod = '.'.join(rel.with_suffix('').parts)
              if mod == 'smoke_imports':
                  continue
              importlib.import_module(mod)

          print('smoke imports ok')
          PY

      - name: Show build version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("scripts/build_vtt.py").read_text(encoding="utf-8", errors="ignore")
          m = re.search(r"BUILD_[A-Z_]+_VERSION\s*=\s*[\'\"]([^\'\"]+)[\'\"]", text)
          print("build_version:", m.group(1) if m else "unknown")
          PY

      - name: Build index
        run: |
          VTT_BUILD_MODE=index python scripts/build_vtt.py

      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: vtt-index
          path: |
            docs/debug/vtt_shards/index.json
            docs/debug/vtt_shards/index_summary.json
          if-no-files-found: error

  build_shards:
    needs: build_index
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard_no: [0, 1, 2, 3, 4]

    env:
      TZ: Asia/Almaty
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Prepare folders
        run: mkdir -p docs docs/raw docs/debug/vtt_shards

      - name: Download index artifact
        uses: actions/download-artifact@v5
        with:
          name: vtt-index
          path: docs/debug/vtt_shards

      - name: Build shard
        run: |
          VTT_BUILD_MODE=shard_index           VTT_SHARD_TOTAL=5           VTT_SHARD_NO=${{ matrix.shard_no }}           VTT_SHARD_NAME=shard-${{ matrix.shard_no }}           python scripts/build_vtt.py

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: vtt-shard-${{ matrix.shard_no }}
          path: |
            docs/debug/vtt_shards/shard-${{ matrix.shard_no }}.json
            docs/debug/vtt_shards/shard-${{ matrix.shard_no }}_summary.json
          if-no-files-found: error

  merge_and_publish:
    needs: build_shards
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TZ: Asia/Almaty
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw docs/debug/vtt_shards
      - name: Full scripts smoke test
        run: |
          python - <<'PY'
          import compileall
          import importlib
          import sys
          from pathlib import Path

          repo = Path('.').resolve()
          scripts_dir = repo / 'scripts'
          sys.path.insert(0, str(repo))
          sys.path.insert(0, str(scripts_dir))

          ok = compileall.compile_dir(str(scripts_dir), force=True, quiet=1)
          if not ok:
              raise SystemExit('compileall failed')

          shared = [
              'cs.core',
              'cs.description',
              'cs.pricing',
              'cs.writer',
              'cs.util',
              'cs.meta',
              'cs.keywords',
              'cs.validators',
              'cs.policy',
              'cs.qg_report',
          ]
          for name in shared:
              importlib.import_module(name)

          for path in scripts_dir.glob('build_*.py'):
              importlib.import_module(path.stem)

          for path in scripts_dir.rglob('*.py'):
              if '__pycache__' in path.parts:
                  continue
              if path.name == '__init__.py':
                  continue
              try:
                  rel = path.relative_to(scripts_dir)
              except ValueError:
                  continue
              mod = '.'.join(rel.with_suffix('').parts)
              if mod == 'smoke_imports':
                  continue
              importlib.import_module(mod)

          print('smoke imports ok')
          PY

      - name: Download index artifact
        uses: actions/download-artifact@v5
        with:
          name: vtt-index
          path: docs/debug/vtt_shards

      - name: Download shard artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: vtt-shard-*
          path: docs/debug/vtt_shards
          merge-multiple: true

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp
          if [ -f docs/vtt.yml ]; then
            cp -f docs/vtt.yml /tmp/prev_vtt.yml
          else
            : > /tmp/prev_vtt.yml
          fi

      - name: Merge shards and build final VTT feed
        run: |
          VTT_BUILD_MODE=merge python scripts/build_vtt.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw docs/debug/vtt_shards || true
          wc -c docs/vtt.yml docs/raw/vtt.yml 2>/dev/null || true
          [ -f docs/raw/vtt_quality_gate.txt ] && sed -n '1,260p' docs/raw/vtt_quality_gate.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-build-output
          path: |
            docs/vtt.yml
            docs/raw/vtt.yml
            docs/raw/vtt_quality_gate.txt
            docs/debug/vtt_shards/index.json
            docs/debug/vtt_shards/index_summary.json
            docs/debug/vtt_shards/shard-*.json
            docs/debug/vtt_shards/shard-*_summary.json
            docs/debug/vtt_shards/merge_summary.json
          if-no-files-found: warn

      - name: Cleanup shard temp files
        if: always()
        run: |
          rm -rf docs/debug/vtt_shards

      - name: Commit & push docs/vtt.yml
        if: success()
        run: |
          git add docs/vtt.yml docs/raw/vtt.yml
          if [ -f docs/raw/vtt_quality_gate.txt ]; then
            git add docs/raw/vtt_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: vtt feed"
          git pull --rebase --autostash
          git push
