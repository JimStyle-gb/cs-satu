# Path: scripts/suppliers/alstyle/config/schema.yml
#
# AlStyle schema config.
#
# Что делает:
# - хранит schema и allow/alias/key rules supplier-layer;
# - не содержит build/business-кода.
#
# Что не делает:
# - не строит final offers;
# - не переносит supplier-specific repair в shared core.
drop_keys_casefold:
- артикул
- штрихкод
- код тн вэд
- код нкт
- код товара kaspi
- код товара kaspi.kz
- благотворительность
- снижена цена
- новинка
- короткое наименование (каз)
- полное наименование (каз)
- назначение
- безопасность

aliases_casefold:
  мощность (bt): Мощность (Вт)
  мощность (bт): Мощность (Вт)
  мощность (вt): Мощность (Вт)

value_normalizers:
  Гарантия:
  - warranty_months

key_rules:
  require_letter: true
  max_len: 60
  max_words: 9

notes: 'Schema is strict: adapter cleans params; core policy for AS should disable clean/split/enrich.'
