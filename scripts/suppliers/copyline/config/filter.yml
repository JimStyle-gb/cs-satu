# Path: scripts/suppliers/copyline/config/filter.yml
#
# CopyLine filter config.
#
# Что делает:
# - хранит supplier assortment filtering rules;
# - содержит только config-данные без business-кода.
#
# Что не делает:
# - не строит offers;
# - не переносит supplier rules в shared core.
mode: include
include_prefixes:
  - Drum
  - Девелопер
  - Драм-картридж
  - Драм-юниты
  - Кабель сетевой
  - Картридж
  - Картриджи
  - Термоблок
  - Тонер-картридж
  - Чернила
