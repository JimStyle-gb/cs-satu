# Path: scripts/suppliers/copyline/config/schema.yml
#
# CopyLine schema config.
#
# Что делает:
# - хранит schema и allow/alias/key rules supplier-layer;
# - не содержит build/business-кода.
#
# Что не делает:
# - не строит final offers;
# - не переносит supplier-specific repair в shared core.
supplier: copyline
adapter_cleans_params: true
key_rules:
  banned_exact:
    - Артикул
    - Код товара
    - Название товара
    - Описание
    - Цена
    - Стоимость
    - Купить
    - Наличие
    - Product code
    - SKU
    - UPC
    - EAN
  discard_exact:
    - Страна происхождения
    - Гарантия производителя
    - Производитель
    - Наименование производителя
  aliases:
    Цвет печати: Цвет
    Ресурс печати: Количество страниц (5% заполнение)
    Количество страниц: Количество страниц (5% заполнение)
    Технология: Технология печати
allow_keys:
  common:
    - Тип
    - Для бренда
    - Модель
  consumable:
    - Тип
    - Для бренда
    - Модель
    - Коды расходников
    - Совместимость
    - Технология печати
    - Цвет
    - Количество страниц (5% заполнение)
    - Ресурс
  cable:
    - Тип
    - Модель
    - Тип кабеля
    - Категория
    - Количество пар
    - Толщина проводников
    - Материал изоляции
    - Бухта
  drum:
    - Тип
    - Для бренда
    - Модель
    - Коды расходников
    - Совместимость
    - Ресурс
