# Path: scripts/suppliers/copyline/config/policy.yml
#
# CopyLine policy config.
#
# Что делает:
# - хранит supplier policy, schedule и quality gate defaults;
# - не содержит parsing/normalization кода.
#
# Что не делает:
# - не строит offers;
# - не подменяет builder/source/quality_gate.
schema_version: 2
supplier: CopyLine
timezone: Asia/Almaty

# Единое расписание проекта:
# CopyLine запускается 1 / 10 / 20 числа в 04:00 по Алматы.
next_run_hour_local: 4
schedule_hour_almaty: 4
schedule_days_of_month:
  - 1
  - 10
  - 20

id_prefix: CL
source_kind: html_site_parsing
source_of_truth_for_params: page_params_first
desc_extract_mode: only_fill_missing
raw_must_be_clean: true
mutate_params: false
auto_codes_from_text: false
auto_compat_from_text: false
unknown_keys: drop

param_priority:
  - Тип
  - Для бренда
  - Коды расходников
  - Совместимость
  - Технология печати
  - Цвет
  - Количество страниц (5% заполнение)
  - Ресурс
  - Модель

quality_gate:
  enabled: true
  enforce: true
  max_cosmetic_offers: 5
  max_cosmetic_issues: 5
  report_file: docs/raw/copyline_quality_gate.txt
  baseline_file: scripts/suppliers/copyline/config/quality_gate_baseline.yml
  # legacy keys for backward-safe compatibility with older local scripts
  report_path: docs/raw/copyline_quality_gate.txt
  baseline_path: scripts/suppliers/copyline/config/quality_gate_baseline.yml
