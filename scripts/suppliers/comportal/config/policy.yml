# Path: scripts/suppliers/comportal/config/policy.yml
#
# ComPortal policy config.
#
# Что делает:
# - хранит supplier policy, schedule и quality gate defaults;
# - не содержит parsing/normalization кода.
#
# Что не делает:
# - не строит offers;
# - не подменяет builder/source/quality_gate.
schema_version: 2
supplier: ComPortal
timezone: Asia/Almaty

# Единое расписание проекта:
# AkCent 22:30 -> AlStyle 23:30 -> ComPortal 00:30 -> CopyLine 01:30 -> VTT 02:30
next_run_hour_local: 0
schedule_hour_almaty: 0
schedule_minute_almaty: 30

id_prefix: CP
placeholder_picture: https://placehold.co/800x800/png?text=No+Photo

vendor_blacklist_casefold:
  - comportal
  - comportal.kz

currency: KZT

param_priority:
  - Тип
  - Для бренда
  - Модель
  - Коды
  - Номер
  - Совместимость
  - Технология печати
  - Цвет
  - Ресурс
  - Объём

core_rules:
  mutate_params: false
  auto_codes_from_text: false
  auto_compat_from_text: false
  placeholder_picture: https://placehold.co/800x800/png?text=No+Photo

supplier_layer:
  source_of_truth_for_params: xml_params_first
  desc_extract_mode: only_fill_missing
  compat_mode: safe_cleanup_only
  raw_must_be_clean: true

quality_gate:
  enabled: true
  enforce: true
  baseline_file: scripts/suppliers/comportal/config/quality_gate_baseline.yml
  report_file: docs/raw/comportal_quality_gate.txt
  max_new_cosmetic_offers: 5
  max_new_cosmetic_issues: 5
  freeze_current_as_baseline: false

notes:
  - ComPortal supplier-layer должен сам отдавать clean raw без supplier-specific правок в core.
  - baseline_file приведён к каноническому имени quality_gate_baseline.yml.
  - next_run_hour_local / schedule_hour_almaty / schedule_minute_almaty зафиксированы на 00:30 по Алматы.
